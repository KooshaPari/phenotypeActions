name: template-sync

description: |
  Synchronize governance files across Phenotype repos using templates from template-commons.
  Detects drift in AGENTS.md, CLAUDE.md, and CI workflow files, then opens PRs to sync them.

inputs:
  template_repo:
    description: "Source template repository (default: template-commons)"
    required: false
    default: "template-commons"
  stage_gates_repo:
    description: Repository containing stage-gates contract templates
    required: false
    default: "phenotype-config"
  stage_gates_template_path:
    description: Path to canonical stage-gates template inside stage_gates_repo
    required: false
    default: "templates/stage-gates/v1/stage-gates.yml"
  target_repos:
    description: "Comma-separated list of target repos to sync (e.g., thegent,cliproxyapi++)"
    required: false
    default: "thegent,cliproxyapi++,agentapi-plusplus,bifrost-extensions,portage,civ,heliosApp,heliosCLI"
  repo_owner:
    description: GitHub owner/org containing target repositories
    required: false
    default: "KooshaPari"
  dry_run:
    description: "If true, report drift but do not create PRs"
    required: false
    default: "false"
  github_token:
    description: GitHub token for creating PRs
    required: true
  base_branch:
    description: "Base branch to create PRs against (default: main)"
    required: false
    default: "main"

runs:
  using: composite
  steps:
    - name: Set up environment
      shell: bash
      run: |
        set -euo pipefail

        # Verify gh CLI is available
        if ! command -v gh >/dev/null 2>&1; then
          echo "ERROR: gh CLI is not installed"
          exit 1
        fi

        echo "GitHub CLI version: $(gh --version)"
        echo "Template Sync action initialized"

    - name: Configure GitHub CLI
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
      run: |
        # Configure gh CLI with provided token
        gh auth status || true

    - name: Detect drift and create sync PRs
      shell: bash
      env:
        TEMPLATE_REPO: ${{ inputs.template_repo }}
        STAGE_GATES_REPO: ${{ inputs.stage_gates_repo }}
        STAGE_GATES_TEMPLATE_PATH: ${{ inputs.stage_gates_template_path }}
        TARGET_REPOS: ${{ inputs.target_repos }}
        REPO_OWNER: ${{ inputs.repo_owner }}
        DRY_RUN: ${{ inputs.dry_run }}
        GH_TOKEN: ${{ inputs.github_token }}
        BASE_BRANCH: ${{ inputs.base_branch }}
        PHENOTYPE_ROOT: ${{ github.workspace }}
      run: |
        set -euo pipefail

        # Colors for output
        RED='\033[0;31m'
        GREEN='\033[0;32m'
        YELLOW='\033[1;33m'
        BLUE='\033[0;34m'
        NC='\033[0m'

        log_info() { echo -e "${BLUE}ℹ${NC} $*"; }
        log_success() { echo -e "${GREEN}✓${NC} $*"; }
        log_warning() { echo -e "${YELLOW}⚠${NC} $*"; }
        log_error() { echo -e "${RED}✗${NC} $*"; }

        resolve_dependency_repo() {
          local label="$1"
          local requested="$2"
          local fallback_path="$3"
          local requested_path="${PHENOTYPE_ROOT}/${requested}"
          local resolved_path=""

          if [[ -d "${requested_path}" ]]; then
            resolved_path="${requested_path}"
          elif [[ "${requested}" == */* ]]; then
            local cloned_dir="${requested##*/}"
            local clone_path="${PHENOTYPE_ROOT}/${cloned_dir}"
            log_info "${label}: cloning ${requested} into ${clone_path}"
            if gh repo clone "${requested}" "${clone_path}" -- --depth 1 >/dev/null 2>&1; then
              resolved_path="${clone_path}"
            fi
          fi

          if [[ -z "${resolved_path}" && -d "${fallback_path}" ]]; then
            resolved_path="${fallback_path}"
            log_warning "${label}: using fallback path ${fallback_path}"
          fi

          if [[ -z "${resolved_path}" ]]; then
            log_error "${label}: dependency repo unavailable (${requested})"
            return 1
          fi

          echo "${resolved_path}"
        }

        TEMPLATE_REPO_PATH="$(resolve_dependency_repo "Template repo" "${TEMPLATE_REPO}" "${PHENOTYPE_ROOT}/phenotypeActions")"
        STAGE_GATES_REPO_PATH="$(resolve_dependency_repo "Stage-gates repo" "${STAGE_GATES_REPO}" "${PHENOTYPE_ROOT}/phenotype-config")"

        log_info "Template Sync"
        log_info "Template repo: ${TEMPLATE_REPO_PATH}"
        log_info "Stage-gates repo: ${STAGE_GATES_REPO_PATH}"
        log_info "Dry run: ${DRY_RUN}"
        log_info "Base branch: ${BASE_BRANCH}"
        echo ""

        # Parse target repos
        IFS=',' read -ra repos <<< "$TARGET_REPOS"

        TOTAL_REPOS=${#repos[@]}
        SYNCED_REPOS=0
        DRIFT_REPOS=()
        RUN_STAMP="$(date -u +%Y%m%dT%H%M%SZ)"
        MATRIX_FILE="${PHENOTYPE_ROOT}/phenotypeActions/docs/stage-gates-canary-readiness-matrix-${RUN_STAMP}.csv"
        mkdir -p "$(dirname "${MATRIX_FILE}")"
        echo "repo,governance_drift,workflow_drift,stage_gates_drift,strictness_drift,stage_gates_ready,canary_ready" > "${MATRIX_FILE}"

        for repo_name in "${repos[@]}"; do
          repo_name=$(echo "$repo_name" | xargs)  # Trim whitespace
          repo_path="${PHENOTYPE_ROOT}/${repo_name}"

          if [[ ! -d "$repo_path" ]]; then
            log_info "Cloning ${REPO_OWNER}/${repo_name}..."
            if ! gh repo clone "${REPO_OWNER}/${repo_name}" "$repo_path" -- --depth 1 >/dev/null 2>&1; then
              log_warning "Repo not found/unreachable (skipping): ${repo_name}"
              continue
            fi
          fi

          log_info "Checking ${repo_name}..."

          # Track if drift detected
          drift_detected=false
          governance_drift=false
          workflow_drift=false
          stage_gates_drift=false
          strictness_drift=false

          # Check for governance file drift
          for file in "AGENTS.md" "CLAUDE.md"; do
            template_file="${TEMPLATE_REPO_PATH}/templates/${file}"
            target_file="${repo_path}/${file}"

            if [[ ! -f "$template_file" ]]; then
              log_warning "Template not found: ${file}"
              continue
            fi

            if [[ ! -f "$target_file" ]]; then
              log_warning "${repo_name}: ${file} missing"
              drift_detected=true
              governance_drift=true
            else
              # Compare files (excluding repo-specific customizations if any)
              if ! diff -q "$template_file" "$target_file" > /dev/null 2>&1; then
                log_warning "${repo_name}: ${file} diverges from template"
                drift_detected=true
                governance_drift=true
              fi
            fi
          done

          # Check for workflow drift (verify composite action references)
          workflows_dir="${repo_path}/.github/workflows"
          if [[ -d "$workflows_dir" ]]; then
            for workflow in policy-gate lint-test; do
              workflow_file=$(find "$workflows_dir" -name "*${workflow}*.yml" -o -name "*${workflow}*.yaml" 2>/dev/null | head -1)

              if [[ -n "$workflow_file" ]]; then
                if ! grep -q "phenotypeActions/actions/${workflow}" "$workflow_file" 2>/dev/null; then
                  log_warning "${repo_name}: ${workflow} workflow does not reference composite action"
                  drift_detected=true
                  workflow_drift=true
                fi
              else
                log_warning "${repo_name}: ${workflow} workflow not found"
                drift_detected=true
                workflow_drift=true
              fi
            done
          fi

          # Check for stage-gates workflow drift against canonical contract template
          stage_gates_template="${STAGE_GATES_REPO_PATH}/${STAGE_GATES_TEMPLATE_PATH}"
          stage_gates_target="${repo_path}/.github/workflows/stage-gates.yml"
          if [[ ! -f "${stage_gates_template}" ]]; then
            log_warning "Canonical stage-gates template not found: ${STAGE_GATES_TEMPLATE_PATH}"
            drift_detected=true
            stage_gates_drift=true
          elif [[ ! -f "${stage_gates_target}" ]]; then
            log_warning "${repo_name}: stage-gates workflow missing"
            drift_detected=true
            stage_gates_drift=true
          elif ! diff -q "${stage_gates_template}" "${stage_gates_target}" > /dev/null 2>&1; then
            log_warning "${repo_name}: stage-gates workflow diverges from contract v1"
            drift_detected=true
            stage_gates_drift=true
          fi

          # Check strictness signal drift for CodeRabbit/Gemini and stage-gates strict variable
          coderabbit_file="${repo_path}/.coderabbit.yaml"
          if [[ ! -f "${coderabbit_file}" ]] || ! grep -Eq "severity:[[:space:]]*info" "${coderabbit_file}"; then
            log_warning "${repo_name}: CodeRabbit strictness signal missing/invalid (expected severity: info)"
            drift_detected=true
            strictness_drift=true
          fi
          gemini_file="${repo_path}/.gemini/config.yaml"
          if [[ -f "${gemini_file}" ]] && ! grep -Eq "comment_severity_threshold:[[:space:]]*LOW" "${gemini_file}"; then
            log_warning "${repo_name}: Gemini strictness signal invalid (expected LOW)"
            drift_detected=true
            strictness_drift=true
          fi
          if [[ -f "${stage_gates_target}" ]] && ! grep -q "STAGE_GATES_STRICT" "${stage_gates_target}"; then
            log_warning "${repo_name}: stage-gates strictness signal wiring missing"
            drift_detected=true
            strictness_drift=true
          fi

          stage_gates_ready=true
          canary_ready=true
          [[ "${stage_gates_drift}" == true ]] && stage_gates_ready=false
          [[ "${strictness_drift}" == true ]] && canary_ready=false
          echo "${repo_name},${governance_drift},${workflow_drift},${stage_gates_drift},${strictness_drift},${stage_gates_ready},${canary_ready}" >> "${MATRIX_FILE}"

          if [[ "$drift_detected" == true ]]; then
            DRIFT_REPOS+=("$repo_name")

            if [[ "$DRY_RUN" != "true" ]]; then
              # Create sync PR for this repo
              log_info "Creating sync PR for ${repo_name}..."

              # Create a temporary branch name
              branch_name="automation/template-sync-$(date +%s)"

              cd "$repo_path"

              # Create and checkout new branch
              git fetch origin "$BASE_BRANCH" 2>/dev/null || true
              git checkout -b "$branch_name" "origin/${BASE_BRANCH}" 2>/dev/null || git checkout -b "$branch_name"

              # Copy updated files
              cp "${TEMPLATE_REPO_PATH}/templates/AGENTS.md" "./AGENTS.md" 2>/dev/null || true
              cp "${TEMPLATE_REPO_PATH}/templates/CLAUDE.md" "./CLAUDE.md" 2>/dev/null || true
              mkdir -p ".github/workflows"
              cp "${STAGE_GATES_REPO_PATH}/${STAGE_GATES_TEMPLATE_PATH}" ".github/workflows/stage-gates.yml" 2>/dev/null || true
              cp "${STAGE_GATES_REPO_PATH}/templates/.coderabbit.yaml" ".coderabbit.yaml" 2>/dev/null || true

              # Stage changes
              git add AGENTS.md CLAUDE.md .github/workflows/stage-gates.yml .coderabbit.yaml 2>/dev/null || true

              # Commit if there are changes
              if ! git diff --cached --quiet; then
                git commit -m "automation: sync governance templates from ${TEMPLATE_REPO}" \
                  -m "Synchronize AGENTS.md and CLAUDE.md from shared templates." \
                  -m "Generated by template-sync automation." \
                  2>/dev/null || true
              fi

              # Push branch and create PR
              git push origin "$branch_name" 2>/dev/null || true

              # Create PR using gh CLI
              pr_output=$(gh pr create \
                --title "automation: sync templates from ${TEMPLATE_REPO}" \
                --body "This PR synchronizes governance files from ${TEMPLATE_REPO}. Includes AGENTS.md and CLAUDE.md updates." \
                --base "$BASE_BRANCH" \
                --head "$branch_name" \
                2>/dev/null || echo "")

              if [[ -n "$pr_output" ]]; then
                log_success "${repo_name}: PR created"
                ((SYNCED_REPOS++))
              else
                log_warning "${repo_name}: Could not create PR (may already exist)"
              fi

              cd - > /dev/null
            else
              log_info "${repo_name}: Drift detected (dry-run, no PR created)"
            fi
          else
            log_success "${repo_name}: In sync"
          fi
        done

        # Summary
        echo ""
        log_info "═══════════════════════════════════════════════"
        log_info "Template Sync Summary"
        log_info "═══════════════════════════════════════════════"
        echo "Total repos checked: $TOTAL_REPOS"
        echo "Repos with drift: ${#DRIFT_REPOS[@]}"
        if [[ ${#DRIFT_REPOS[@]} -gt 0 ]]; then
          echo "Repos needing sync:"
          for repo in "${DRIFT_REPOS[@]}"; do
            echo "  - $repo"
          done
        fi
        echo ""

        if [[ "$DRY_RUN" == "true" ]]; then
          log_warning "Dry run mode: no PRs created"
        else
          log_success "Synced repos: $SYNCED_REPOS"
        fi
        echo "Readiness matrix: ${MATRIX_FILE}"
