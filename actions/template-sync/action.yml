name: template-sync

description: |
  Synchronize governance files across Phenotype repos using templates from template-commons.
  Detects drift in AGENTS.md, CLAUDE.md, and CI workflow files, then opens PRs to sync them.

inputs:
  template_repo:
    description: "Source template repository (default: template-commons)"
    required: false
    default: "template-commons"
  target_repos:
    description: "Comma-separated list of target repos to sync (e.g., thegent,cliproxyapi++)"
    required: false
    default: "thegent,cliproxyapi++,agentapi-plusplus,bifrost-extensions,portage,civ,heliosApp,heliosCLI"
  dry_run:
    description: "If true, report drift but do not create PRs"
    required: false
    default: "false"
  github_token:
    description: "GitHub token for creating PRs"
    required: true
  base_branch:
    description: "Base branch to create PRs against (default: main)"
    required: false
    default: "main"
  strictness_mode:
    description: "Triad enforcement mode: strict or non-strict"
    required: false
    default: "strict"

runs:
  using: composite
  steps:
    - name: Set up environment
      shell: bash
      run: |
        set -euo pipefail

        # Verify gh CLI is available
        if ! command -v gh >/dev/null 2>&1; then
          echo "ERROR: gh CLI is not installed"
          exit 1
        fi

        echo "GitHub CLI version: $(gh --version)"
        echo "Template Sync action initialized"

    - name: Configure GitHub CLI
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
      run: |
        set -euo pipefail
        if [[ -z "${GH_TOKEN:-}" ]]; then
          echo "ERROR: inputs.github_token is required and was empty"
          exit 1
        fi
        if ! gh auth status >/dev/null 2>&1; then
          echo "ERROR: gh auth failed for provided token"
          echo "ACTION: verify token is valid and has repo scope (contents:write, pull_requests:write)"
          exit 1
        fi
        echo "GitHub authentication preflight passed"

    - name: Detect drift and create sync PRs
      shell: bash
      env:
        TEMPLATE_REPO: ${{ inputs.template_repo }}
        TARGET_REPOS: ${{ inputs.target_repos }}
        DRY_RUN: ${{ inputs.dry_run }}
        GH_TOKEN: ${{ inputs.github_token }}
        BASE_BRANCH: ${{ inputs.base_branch }}
        STRICTNESS_MODE: ${{ inputs.strictness_mode }}
      run: |
        set -euo pipefail

        # Colors for output
        RED='\033[0;31m'
        GREEN='\033[0;32m'
        YELLOW='\033[1;33m'
        BLUE='\033[0;34m'
        NC='\033[0m'

        log_info() { echo -e "${BLUE}ℹ${NC} $*"; }
        log_success() { echo -e "${GREEN}✓${NC} $*"; }
        log_warning() { echo -e "${YELLOW}⚠${NC} $*"; }
        log_error() { echo -e "${RED}✗${NC} $*"; }
        fail() { log_error "$*"; exit 1; }

        action_root="${GITHUB_ACTION_PATH:-.}"
        phenotype_root="$(dirname "$(dirname "${action_root}")")"
        template_root="${phenotype_root}/${TEMPLATE_REPO}"

        # Verify template repo exists
        if [[ ! -d "${template_root}" ]]; then
          fail "Template repo not found: ${template_root}"
        fi
        [[ -n "${GH_TOKEN:-}" ]] || fail "GH token is empty"
        gh auth status >/dev/null 2>&1 || fail "gh authentication lost before sync run"
        if ! gh api -X GET /user/repos -f per_page=1 >/dev/null 2>&1; then
          fail "Token cannot list repos. Required scopes/permissions are missing."
        fi

        rm -rf "${WORK_ROOT}"
        mkdir -p "${WORK_ROOT}"

        log_info "Template Sync"
        log_info "Resolved phenotype root: ${phenotype_root}"
        log_info "Template repo: ${TEMPLATE_REPO}"
        log_info "Dry run: ${DRY_RUN}"
        log_info "Base branch: ${BASE_BRANCH}"
        log_info "Strictness mode: ${STRICTNESS_MODE}"
        echo ""

        # Clone template repo for runtime portability on GitHub-hosted runners
        log_info "Cloning template repository..."
        if ! gh repo clone "${OWNER}/${TEMPLATE_REPO}" "${WORK_ROOT}/${TEMPLATE_REPO}" -- -q; then
          log_error "Failed to clone template repo: ${OWNER}/${TEMPLATE_REPO}"
          exit 1
        fi

        # Parse target repos
        IFS=',' read -ra repos <<< "$TARGET_REPOS"

        TOTAL_REPOS=${#repos[@]}
        SYNCED_REPOS=0
        DRIFT_REPOS=()

        for repo_name in "${repos[@]}"; do
          repo_name=$(echo "$repo_name" | xargs)  # Trim whitespace
          repo_path="${phenotype_root}/${repo_name}"

          if ! gh repo clone "${OWNER}/${repo_name}" "${repo_path}" -- -q 2>/dev/null; then
            log_warning "Repo not found or inaccessible (skipping): ${OWNER}/${repo_name}"
            continue
          fi

          log_info "Checking ${repo_name}..."

          # Track if drift detected
          drift_detected=false

          # Check for governance file drift
          for file in "AGENTS.md" "CLAUDE.md"; do
            template_file="${template_root}/templates/${file}"
            target_file="${repo_path}/${file}"

            if [[ ! -f "$template_file" ]]; then
              log_warning "Template not found: ${file}"
              continue
            fi

            if [[ ! -f "$target_file" ]]; then
              log_warning "${repo_name}: ${file} missing"
              drift_detected=true
            else
              # Compare files (excluding repo-specific customizations if any)
              if ! diff -q "$template_file" "$target_file" > /dev/null 2>&1; then
                log_warning "${repo_name}: ${file} diverges from template"
                drift_detected=true
              fi
            fi
          done

          # Check for workflow drift (verify reusable workflow references)
          workflows_dir="${repo_path}/.github/workflows"
          if [[ -d "$workflows_dir" ]]; then
            policy_gate_file=$(find "$workflows_dir" -name "*policy-gate*.yml" -o -name "*policy-gate*.yaml" 2>/dev/null | head -1)
            stage_gates_file=$(find "$workflows_dir" -name "*stage-gates*.yml" -o -name "*stage-gates*.yaml" 2>/dev/null | head -1)

            if [[ -z "$policy_gate_file" ]]; then
              log_warning "${repo_name}: policy-gate workflow not found"
              drift_detected=true
            elif ! grep -q "phenotypeActions/.github/workflows/policy-gate.yml" "$policy_gate_file" 2>/dev/null; then
              log_warning "${repo_name}: policy-gate workflow is not pinned to reusable phenotypeActions policy-gate"
              drift_detected=true
            fi

            if [[ -z "$stage_gates_file" ]]; then
              log_warning "${repo_name}: stage-gates workflow not found"
              drift_detected=true
            elif ! grep -q "phenotypeActions/.github/workflows/stage-gates.yml" "$stage_gates_file" 2>/dev/null; then
              log_warning "${repo_name}: stage-gates workflow is not pinned to reusable phenotypeActions stage-gates"
              drift_detected=true
            fi
          else
            log_warning "${repo_name}: workflows directory missing"
            drift_detected=true
          fi

          # Strictness triad checks: format/lint/unit command compatibility
          has_format=false
          has_lint=false
          has_unit=false

          makefile_path="${repo_path}/Makefile"
          justfile_path="${repo_path}/justfile"

          if [[ -f "$makefile_path" ]]; then
            grep -Eq '^[[:space:]]*format:' "$makefile_path" && has_format=true
            grep -Eq '^[[:space:]]*lint:' "$makefile_path" && has_lint=true
            grep -Eq '^[[:space:]]*unit:' "$makefile_path" && has_unit=true
          fi

          if [[ -f "$justfile_path" ]]; then
            grep -Eq '^[[:space:]]*format:' "$justfile_path" && has_format=true
            grep -Eq '^[[:space:]]*lint:' "$justfile_path" && has_lint=true
            grep -Eq '^[[:space:]]*unit:' "$justfile_path" && has_unit=true
          fi

          if [[ -f "${repo_path}/Cargo.toml" ]]; then
            has_format=true
            has_lint=true
            has_unit=true
          elif [[ -f "${repo_path}/go.mod" ]]; then
            has_format=true
            has_lint=true
            has_unit=true
          elif [[ -f "${repo_path}/pyproject.toml" || -f "${repo_path}/setup.py" ]]; then
            has_format=true
            has_lint=true
            has_unit=true
          elif [[ -f "${repo_path}/package.json" ]]; then
            has_unit=true
            if grep -Eq '"lint"[[:space:]]*:' "${repo_path}/package.json"; then
              has_lint=true
            fi
            if grep -Eq '"format"[[:space:]]*:' "${repo_path}/package.json"; then
              has_format=true
            fi
          fi

          triad_missing=()
          [[ "$has_format" == true ]] || triad_missing+=("format")
          [[ "$has_lint" == true ]] || triad_missing+=("lint")
          [[ "$has_unit" == true ]] || triad_missing+=("unit")

          if [[ ${#triad_missing[@]} -gt 0 ]]; then
            log_warning "${repo_name}: strictness-triad gaps detected: ${triad_missing[*]}"
            drift_detected=true
            if [[ "$STRICTNESS_MODE" == "strict" ]]; then
              fail "${repo_name}: strictness mode is strict and triad requirements are not satisfied"
            fi
          fi

          if [[ "$drift_detected" == true ]]; then
            DRIFT_REPOS+=("$repo_name")

            if [[ "$DRY_RUN" != "true" ]]; then
              # Create sync PR for this repo
              log_info "Creating sync PR for ${repo_name}..."

              # Create a temporary branch name
              branch_name="automation/template-sync-$(date +%s)"

              cd "$repo_path"

              # Create and checkout new branch
              if ! git fetch origin "$BASE_BRANCH"; then
                fail "${repo_name}: failed to fetch origin/${BASE_BRANCH}"
              fi
              if ! git checkout -b "$branch_name" "origin/${BASE_BRANCH}"; then
                fail "${repo_name}: failed to create branch from origin/${BASE_BRANCH}"
              fi

              # Copy updated files
              cp "${template_root}/templates/AGENTS.md" "./AGENTS.md"
              cp "${template_root}/templates/CLAUDE.md" "./CLAUDE.md"

              # Stage changes
              git add AGENTS.md CLAUDE.md

              # Commit if there are changes
              if ! git diff --cached --quiet; then
                git commit \
                  -m "automation: sync governance templates from ${TEMPLATE_REPO}" \
                  -m "This PR synchronizes governance templates (AGENTS.md, CLAUDE.md) from template-commons." \
                  -m "Generated by template-sync automation." \
                  -m "Co-authored-by: Codex <noreply@openai.com>"
              fi

              # Push branch and create PR
              if ! git push origin "$branch_name"; then
                fail "${repo_name}: failed to push ${branch_name}"
              fi

              # Create PR using gh CLI
              pr_output=$(gh pr create \
                --title "automation: sync templates from ${TEMPLATE_REPO}" \
                --body "This PR synchronizes governance files (AGENTS.md, CLAUDE.md) from ${TEMPLATE_REPO}. Please review and merge if acceptable." \
                --base "$BASE_BRANCH" \
                --head "$branch_name" \
                2>&1) || fail "${repo_name}: failed to create PR: ${pr_output}"

              if [[ -n "$pr_output" ]]; then
                log_success "${repo_name}: PR created"
                ((SYNCED_REPOS++))
              else
                log_warning "${repo_name}: Could not create PR (may already exist)"
              fi

              cd - > /dev/null
            else
              log_info "${repo_name}: Drift detected (dry-run, no PR created)"
            fi
          else
            log_success "${repo_name}: In sync"
          fi
        done

        # Summary
        echo ""
        log_info "═══════════════════════════════════════════════"
        log_info "Template Sync Summary"
        log_info "═══════════════════════════════════════════════"
        echo "Total repos checked: $TOTAL_REPOS"
        echo "Repos with drift: ${#DRIFT_REPOS[@]}"
        if [[ ${#DRIFT_REPOS[@]} -gt 0 ]]; then
          echo "Repos needing sync:"
          for repo in "${DRIFT_REPOS[@]}"; do
            echo "  - $repo"
          done
        fi
        echo ""

        if [[ "$DRY_RUN" == "true" ]]; then
          log_warning "Dry run mode: no PRs created"
        else
          log_success "Synced repos: $SYNCED_REPOS"
        fi
